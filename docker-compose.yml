
services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: mern-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mern-network

  # Web Server Nginx
  web-server:
    image: nginx:alpine
    container_name: mern-web-server
    ports: 
      - "80:80"
    networks:
      - mern-network
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      
  # Backend
  backend:
    build: ./backend
    container_name: mern-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/public:/app/public
    networks:
      - mern-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mern-frontend
    volumes:
      - ./frontend:/app
      - ./frontend/dist:/app/dist
    networks:
      - mern-network

volumes:
  redis_data:

networks:
  mern-network:
    driver: bridge