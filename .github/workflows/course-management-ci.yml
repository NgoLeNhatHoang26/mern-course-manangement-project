name: Course-management CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Nếu muốn nhanh, Ngọc có thể chỉ giữ lại [20.x]
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies 
        run: npm ci

      # Bước này cực kỳ quan trọng với TypeScript để check lỗi logic kiểu dữ liệu
      - name: Build Source Code
        run: npm run build --if-present

      - name: Check Code Style (Lint)
        run: npm run lint
        continue-on-error: true # Giữ đúng ý của Ngọc: cảnh báo nhưng không chặn

      - name: Run Logic Test (Vitest)
        run: npm run test:unit
